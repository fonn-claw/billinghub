  <circle cx="100" cy="60" r="32" fill="none" stroke="#C8D2E0" stroke-width="1.5"/>
  <circle cx="100" cy="60" r="26" fill="#F8F9FC" stroke="#E8AA42" stroke-width="1.5" opacity="0.6"/>
  <text x="100" y="67" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#E8AA42" opacity="0.6">$</text>
  <!-- Wave underneath -->
