<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Wave base: two overlapping wave crests forming a harbor shape -->
  <path d="M6 30 Q14 22 24 26 Q34 30 42 22" stroke="#1B6B93" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M6 36 Q14 28 24 32 Q34 36 42 28" stroke="#0C2D48" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Invoice/receipt element: small rectangle with lines, sitting above waves -->
  <rect x="18" y="8" width="12" height="16" rx="1.5" fill="#0C2D48"/>
  <line x1="21" y1="13" x2="27" y2="13" stroke="#E8AA42" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="21" y1="16.5" x2="27" y2="16.5" stroke="#F8F9FC" stroke-width="1" stroke-linecap="round"/>
  <line x1="21" y1="19.5" x2="25" y2="19.5" stroke="#F8F9FC" stroke-width="1" stroke-linecap="round"/>
</svg>